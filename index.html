<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Shelved</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0..1,0&display=block" />
<style>
  :root{
    --background:#F8EFE0;
    --sand:#E8D9C9;
    --blue:#CCD6FF;
    --burgundy:#581000;
    --dark-text:#100507;
    --green:#71600F;
    --mauve:#8E4B4F;
    --orange:#F25801;
    --purple:#D3B8E8;
    --tan:#D1975C;
    --text-alt:#846A6D;
    --white:#FFFFFF;

    --font-serif: 'Playfair Display', serif;
    --font-sans: 'Plus Jakarta Sans', sans-serif;

    --side: 24px; /* standard page side padding, used only for text/header content */
  }

  .material-icon{
    font-family:'Material Symbols Outlined';
    font-weight:normal;
    font-style:normal;
    font-size:20px;
    line-height:1;
    letter-spacing:normal;
    text-transform:none;
    display:inline-block;
    white-space:nowrap;
    word-wrap:normal;
    direction:ltr;
    -webkit-font-feature-settings:'liga';
    -webkit-font-smoothing:antialiased;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; height:100%;}
  body{
    background:var(--background);
    color:var(--dark-text);
    font-family:var(--font-sans);
    -webkit-font-smoothing:antialiased;
    height:100vh;
    height:100dvh;
    overflow:hidden;
    overscroll-behavior-y:none;
  }

  #app{
    max-width:560px;
    margin:0 auto;
    height:100vh;
    height:100dvh;
    position:relative;
    background:var(--background);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: max(28px, env(safe-area-inset-top)) var(--side) 18px;
    gap:12px;
    position:relative;
  }
  .circle-btn{
    width:42px;height:42px;border-radius:50%;
    border:1.5px solid var(--dark-text);
    background:transparent;color:var(--dark-text);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0; cursor:pointer; font-size:16px;
    font-family:var(--font-sans);
  }
  .circle-btn:active{ opacity:.6; }

  .circle-btn-filled{
    width:42px;height:42px;border-radius:50%;
    border:none;
    background:var(--dark-text);color:var(--white);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0; cursor:pointer; font-size:16px;
    font-family:var(--font-sans);
  }
  .circle-btn-filled:active{ opacity:.6; }
  .circle-btn-filled .material-icon{
    font-variation-settings: 'FILL' 1, 'wght' 400, 'opsz' 20, 'GRAD' 0;
  }

  .topbar-left{ display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .topbar .title-center{
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    white-space:nowrap;
    font-family:var(--font-sans); font-size:15px; color:var(--dark-text);
  }
  .pill-btn{
    background:var(--white);
    border:none;
    border-radius:999px;
    padding:9px 20px;
    font-family:var(--font-sans);
    font-size:14px; font-weight:500;
    color:var(--dark-text);
    cursor:pointer;
    flex-shrink:0;
  }
  .pill-btn:active{opacity:.7;}

  /* ---------- Home header ---------- */
  .home-header{
    padding: max(28px, env(safe-area-inset-top)) var(--side) 0;
  }
  .home-header-row{
    display:flex; align-items:center; justify-content:space-between;
    min-height:42px;
  }
  .home-header h1{
    margin:0;
    line-height:1;
    display:flex;
    align-items:center;
  }
  .home-header h1.logo-mark svg{
    height:19px;
    width:auto;
    display:block;
    fill:var(--dark-text);
  }
  .tab-stack{
    display:flex; flex-direction:column; align-items:flex-end;
    margin-top:16px;
    margin-right:6px;
  }
  .tab-stack button{
    background:none;border:none;
    font-family:var(--font-sans);
    font-size:16pt;
    font-weight:500;
    line-height:20pt;
    color: var(--text-alt);
    cursor:pointer; padding:0;
  }
  .tab-stack button.active{ color: var(--dark-text); }

  .home-divider{
    margin-top:33px;
    border-top:1px solid var(--dark-text);
  }

  /* ---------- Crumb header (shelf detail) ---------- */
  .crumb-row{
    padding: 16px var(--side) 16px;
    border-top:1px solid var(--dark-text);
    border-bottom:1px solid var(--dark-text);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .crumb-title{
    font-family:var(--font-serif);
    font-size:34px; font-weight:400;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    min-width:0;
  }
  .group-title-row{
    font-family:var(--font-sans); font-size:16pt; font-weight:500; line-height:24pt;
    color:var(--dark-text);
    margin:22px var(--side) 0;
    padding-bottom:8px;
    border-bottom:1px solid var(--dark-text);
    display:flex; align-items:baseline; justify-content:space-between;
  }
  .group-title-sub{
    color:var(--text-alt); font-weight:400;
  }
  .count-badges{ display:flex; gap:6px; align-items:center; flex-shrink:0; }
  .badge{
    width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-sans);
    font-size:14px; font-weight:600;
    line-height:1;
    flex-shrink:0;
  }
  .badge.filled{ background:var(--green); color:var(--white); }
  .badge.outline{ background:transparent; border:1.5px solid var(--green); color:var(--dark-text); }
  .shelf-card .shelf-lock-icon{
    font-size:19px;
    margin-left:-2px;
    font-variation-settings: 'FILL' 1, 'wght' 400, 'opsz' 20, 'GRAD' 0;
  }
  .right-edit{
    color:var(--text-alt); font-size:14px; font-weight:500; cursor:pointer; flex-shrink:0;
  }

  /* ---------- List area (edge to edge content) ---------- */
  .list-area{
    flex:1; overflow-y:auto; padding: 0 0 110px;
    -webkit-overflow-scrolling:touch;
    touch-action:pan-y;
  }
  .list-area.with-side-pad{ padding-left:var(--side); padding-right:var(--side); }

  /* simple text-link rows (cities) — styled to match the home nav items */
  .simple-row{
    display:flex; align-items:center; justify-content:space-between;
    font-family:var(--font-sans); font-size:16pt; line-height:24pt; font-weight:500;
    opacity:1;
    margin-bottom:4px;
    padding:0 var(--side); cursor:pointer; color:var(--dark-text);
  }

  /* category rows (bold sans, Casual/Fancy/...) */
  .cat-row{
    font-family:var(--font-sans); font-size:17px; font-weight:500; line-height:21px;
    padding:6px var(--side); cursor:pointer; color:var(--dark-text);
  }
  .cat-row .count{ color:var(--text-alt); font-weight:400; font-size:14px; }

  /* item card -- edge to edge, fully rounded, small gap between */
  .add-item-row{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--white);
    border:none;
    border-radius:999px;
    padding:18px var(--side);
    margin: 0 0 8px 0;
    cursor:pointer;
    color:var(--text-alt);
    font-family:var(--font-sans); font-size:15px; font-weight:600;
  }
  .add-circle-outline{
    width:24px;height:24px;border-radius:50%;
    border:1.5px solid var(--text-alt); background:transparent;
    color:var(--text-alt); display:flex;align-items:center;justify-content:center;
    flex-shrink:0; cursor:pointer; font-size:14px;
  }

  .item-card{
    background:var(--sand);
    border-radius:30px;
    padding:18px var(--side);
    margin: 0 0 8px 0;
  }
  .item-card.editing-fields{ padding:18px var(--side); }
  .item-edit-top{
    display:flex; align-items:flex-end; justify-content:space-between; gap:10px;
    margin-bottom:14px;
  }
  .item-name-input{
    flex:1; border:none; border-bottom:1.5px solid rgba(16,5,7,0.5);
    background:transparent; color:var(--dark-text); outline:none;
    font-family:var(--font-sans); font-size:15px; font-weight:700; line-height:20px;
    padding:0 0 4px;
  }
  .item-name-input:empty:before{
    content: attr(data-placeholder);
    color:var(--text-alt); font-weight:700;
  }
  .item-note-input{
    font-family:var(--font-sans); font-size:14px; font-weight:500; color:var(--dark-text);
    line-height:17pt;
    outline:none; white-space:pre-wrap; word-break:break-word;
    margin-bottom:10px; min-height:18px;
  }
  .item-note-input:empty:before{
    content: attr(data-placeholder);
    color:var(--text-alt);
  }
  .item-link-row{
    display:flex; align-items:center; gap:6px;
  }
  .item-link-row .link-icon{ font-size:15px; color:var(--text-alt); flex-shrink:0; }
  .item-link-input{
    font-family:var(--font-sans); font-size:13px; font-weight:500; color:var(--text-alt);
    outline:none; flex:1; white-space:nowrap; overflow:hidden;
  }
  .item-link-input:empty:before{
    content: attr(data-placeholder);
    color:var(--text-alt);
  }
  .item-card .name{ font-weight:700; font-size:15px; margin-bottom:4px;}
  .item-card .note{ font-size:14px; font-weight:500; color:var(--dark-text); margin-bottom:6px; white-space:pre-wrap; line-height:17pt; }
  .item-card .link{
    font-size:13px; font-weight:500; color:var(--text-alt); display:flex; gap:6px; align-items:center;
    text-decoration:none; word-break:break-all;
  }
  .item-card .link .link-icon{ font-size:15px; flex-shrink:0; }
  .item-card.editing{ display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .item-card .edit-actions{ display:flex; gap:8px; flex-shrink:0; }
  .icon-btn{
    width:32px;height:32px;border-radius:50%;border:1.5px solid var(--mauve);
    background:transparent;color:var(--mauve);display:flex;align-items:center;justify-content:center;
    cursor:pointer; font-size:14px;
  }

  /* shelf cards on home/favorites — full bleed, fully rounded (stadium), no gap-fill overlay on arrow */
  .shelf-card{
    border-radius:44px;
    padding:16px var(--side);
    margin: 0;
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer;
    color:var(--dark-text);
  }
  .shelf-card h3{
    font-family:var(--font-serif); font-size:28px; margin:0; font-weight:400;
    display:flex; align-items:center; gap:10px;
  }
  .shelf-card .badges-inline{ display:flex; gap:6px; }
  @keyframes homeFadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
  }
  .home-fade-in{ animation: homeFadeIn 0.3s ease; }
  .home-edit-actions{ display:flex; gap:6px; align-items:center; }
  .home-edit-icon-btn{
    width:42px; height:42px; border-radius:50%;
    border:1.5px solid currentColor; background:transparent;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
  }
  .home-edit-icon-btn .material-icon{ font-size:20px; }
  .drag-handle{ cursor:grab; touch-action:none; }
  .drag-handle.drag-disabled{ opacity:.35; cursor:not-allowed; }
  .shelf-card.dragging{
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
    transition:none !important;
  }
  .shelf-card .arrow-circle{
    width:42px;height:42px;border-radius:50%;
    border:1.5px solid currentColor;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    background:transparent;
    font-size:16px;
  }

  /* ---------- Build a shelf form (bottom sheet style panel) ---------- */
  .sheet-panel{
    background:var(--white);
    border-radius:34px 34px 0 0;
    flex:1;
    display:flex; flex-direction:column;
    min-height:0;
    position:relative;
  }
  .form-bottom-fade{
    position:absolute; left:0; right:0; bottom:0;
    height:calc(124px + env(safe-area-inset-bottom));
    background:linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 52%, rgba(255,255,255,1) 100%);
    pointer-events:none;
  }
  .sheet-header-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px var(--side) 16px;
    border-bottom:1px solid rgba(16,5,7,0.18);
    flex-shrink:0;
  }
  .sheet-header-title{
    font-family:var(--font-sans); font-weight:700; font-size:18px;
    color:var(--dark-text);
  }
  .form-area{ padding:4px var(--side) 110px; flex:1; overflow-y:auto;}
  .form-label{ font-size:16px; margin:34px 0 12px; color:var(--dark-text); }
  .swatches{ display:flex; gap:10px; flex-wrap:wrap;}
  .privacy-toggle{ display:flex; gap:10px; }
  .privacy-btn{
    border-radius:999px;
    padding:10px 22px;
    font-family:var(--font-sans); font-size:15px; font-weight:600;
    cursor:pointer;
    background:transparent;
    border:1.5px solid var(--text-alt);
    color:var(--text-alt);
  }
  .privacy-btn.selected{
    background:var(--dark-text);
    border-color:var(--dark-text);
    color:var(--white);
  }
  .swatch{
    width:28px;height:28px;border-radius:50%;
    border:2.5px solid transparent; cursor:pointer;
  }
  .swatch.selected{ border-color: var(--dark-text); }

  .custom-swatch{
    position:relative;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    background:var(--white);
  }
  .custom-swatch .material-icon{
    font-size:14px; color:var(--dark-text);
    pointer-events:none;
  }
  .custom-swatch input[type="color"]{
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    opacity:0; cursor:pointer; border:none; padding:0;
  }
  .name-input{
    width:calc(100% + var(--side) * 2);
    margin-left:calc(var(--side) * -1);
    margin-right:calc(var(--side) * -1);
    border:none; outline:none;
    border-radius:999px;
    padding:18px 26px;
    font-family:var(--font-serif); font-size:22px;
  }
  .name-input::placeholder{ color:currentColor; opacity:.45; }
  .cat-input-row{ display:flex; align-items:flex-end; gap:10px; margin-bottom:0;}
  .cat-input-row.sub-level{ margin-bottom:0; }
  .cat-row-actions{ display:flex; gap:6px; flex-shrink:0; }
  .add-circle{
    width:24px;height:24px;border-radius:50%;border:1.5px solid var(--dark-text);
    color:var(--dark-text); background:transparent; display:flex;align-items:center;justify-content:center;
    flex-shrink:0; cursor:pointer; font-size:14px; line-height:1; padding:0;
  }
  .cat-text-input{
    flex:1; border:none; border-bottom:1.5px solid rgba(16,5,7,0.5);
    background:transparent; font-family:var(--font-sans); font-size:16pt; font-weight:500;
    line-height:24pt;
    padding:0 0 2.5px;
    outline:none; color:var(--dark-text);
    white-space:nowrap; overflow:hidden;
  }
  .cat-text-input:empty:before{
    content: attr(data-placeholder);
    color:var(--text-alt); font-weight:500;
  }
  .cat-text-input.sub-level{
    font-size:17px;
    line-height:21px;
    padding:6px 0 4.5px;
  }
  .depth-hint{ font-size:13px; color:var(--text-alt); margin-top:6px; font-weight:400; }

  /* floating round CTA bottom-right */
  .bottom-cta{
    position:absolute; right:var(--side); bottom: calc(18px + env(safe-area-inset-bottom));
    width:42px;height:42px;border-radius:50%;
    background:var(--dark-text); color:var(--white);
    border:none; font-size:18px; cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    z-index:2;
  }
  .bottom-cta .material-icon{ font-size:20px; }

  /* ---------- bottom search bar ---------- */
  .bottom-bar{
    position:absolute; left:0; right:0; bottom:0;
    padding: 18px var(--side) calc(18px + env(safe-area-inset-bottom));
    display:flex; gap:12px; align-items:center;
    border-top:1px solid var(--dark-text);
    background:var(--background);
    z-index:5;
  }
  .search-input{
    flex:1; border:none; outline:none;
    background:var(--sand);
    border-radius:999px;
    padding:14px 22px;
    font-family:var(--font-sans); font-size:15px; font-weight:500;
    color:var(--dark-text);
  }
  .search-input::placeholder{ color:var(--text-alt); }
  .add-btn-circle{
    width:42px;height:42px;border-radius:50%;
    border:none; background:var(--dark-text);
    color:var(--white); flex-shrink:0; cursor:pointer; font-size:18px;
    display:flex;align-items:center;justify-content:center;
  }

  .search-result-row{
    background:var(--sand);
    border-radius:24px;
    padding:14px var(--side);
    margin:0 0 8px 0;
    cursor:pointer;
  }
  .search-result-crumb{
    font-size:14px; font-weight:500; color:var(--text-alt); margin-bottom:2px;
  }
  .search-result-name{
    font-family:var(--font-sans); font-size:17px; font-weight:700; color:var(--dark-text);
  }
  .search-result-name .count{ color:var(--text-alt); font-weight:400; font-size:14px; }

  .empty-level-choice{ margin-top:4px; }
  .empty-level-or{
    text-align:center; font-family:var(--font-sans); font-size:13px; font-weight:700;
    text-transform:uppercase;
    color:var(--text-alt); margin:14px 0;
  }

  .empty-state{
    text-align:center; color:var(--text-alt); padding:60px var(--side); font-size:15px;
  }

  .hidden{ display:none !important; }

  @keyframes slideUpSheet{
    from{ transform: translateY(100%); }
    to{ transform: translateY(0); }
  }
  @keyframes slideDownSheet{
    from{ transform: translateY(0); }
    to{ transform: translateY(100%); }
  }
  @keyframes rowSlideIn{
    from{ transform: translateY(-10px); }
    to{ transform: translateY(0); }
  }
  .rows-slide-container{
    overflow:hidden;
  }
  .build-sheet-wrapper{
    position:absolute; left:0; right:0; top:0; bottom:0;
    display:flex; flex-direction:column;
    z-index:10;
  }
  .build-sheet-wrapper.animate-in{
    animation: slideUpSheet 0.55s ease;
  }
  .build-sheet-wrapper.animate-out{
    animation: slideDownSheet 0.4s ease;
    animation-fill-mode: forwards;
  }
  .sheet-fade{
    flex-shrink:0;
    background: linear-gradient(to bottom, rgba(248,239,224,0.2) 0%, var(--background) 100%);
    pointer-events:none;
  }
  a{ color:inherit; }
  ::-webkit-scrollbar{ display:none; }

  .password-gate{
    position:fixed; inset:0;
    background:var(--background);
    z-index:1000;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .password-gate-card{
    width:100%; max-width:340px;
    display:flex; flex-direction:column; align-items:center;
    gap:18px;
  }
  .password-gate-logo svg{ height:22px; width:auto; fill:var(--dark-text); }
  .password-gate-label{
    font-family:var(--font-sans); font-size:15px; font-weight:500;
    color:var(--text-alt); text-align:center;
  }
  .password-gate-input{
    width:100%; border:none; outline:none;
    background:var(--sand);
    border-radius:999px;
    padding:16px 22px;
    font-family:var(--font-sans); font-size:16px; font-weight:500;
    color:var(--dark-text);
    text-align:center;
  }
  .password-gate-input::placeholder{ color:var(--text-alt); }
  .password-gate-error{
    font-family:var(--font-sans); font-size:13px; font-weight:500;
    color:var(--orange); text-align:center; margin-top:-8px;
  }
  .password-gate-btn{
    width:100%; border:none; cursor:pointer;
    background:var(--dark-text); color:var(--white);
    border-radius:999px;
    padding:16px 22px;
    font-family:var(--font-sans); font-size:16px; font-weight:600;
  }
  .password-gate-cancel{
    width:100%; border:none; cursor:pointer; background:transparent;
    color:var(--text-alt); font-family:var(--font-sans); font-size:14px; font-weight:500;
    padding:4px;
  }
  .password-gate-btn:active{ opacity:.8; }
  .password-gate.hidden{ display:none; }
</style>
</head>
<body>
<div id="passwordGate" class="password-gate">
  <div class="password-gate-card">

function hexToRgb(hex){
  hex = hex.replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const num = parseInt(hex,16);
  return { r:(num>>16)&255, g:(num>>8)&255, b:num&255 };
}

function relativeLuminance(hex){
  const {r,g,b} = hexToRgb(hex);
  const [rs,gs,bs] = [r,g,b].map(v=>{
    v/=255;
    return v<=0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4);
  });
  return 0.2126*rs + 0.7152*gs + 0.0722*bs;
}

function contrastRatio(hex1, hex2){
  const L1 = relativeLuminance(hex1);
  const L2 = relativeLuminance(hex2);
  const lighter = Math.max(L1,L2), darker = Math.min(L1,L2);
  return (lighter + 0.05) / (darker + 0.05);
}

// Explicit overrides for specific brand colors where the contrast-winner
// isn't the desired look (e.g. orange reads better with white text even
// though dark text technically wins by a small WCAG margin).
const TEXT_COLOR_OVERRIDES = {
  '#F25801': '#FFFFFF', // Orange
};

function textColorFor(hex){
  const upperHex = hex.toUpperCase();
  if(TEXT_COLOR_OVERRIDES[upperHex]) return TEXT_COLOR_OVERRIDES[upperHex];

  // Pick whichever of dark-text / white gives the higher contrast against this background.
  const DARK = '#100507';
  const WHITE = '#FFFFFF';
  const contrastWithDark = contrastRatio(hex, DARK);
  const contrastWithWhite = contrastRatio(hex, WHITE);
  return contrastWithDark >= contrastWithWhite ? DARK : WHITE;
}

/* =====================================================
   SUPABASE DATA LAYER
   DB.shelves is the in-memory tree the rest of the app already
   reads/mutates directly (unchanged). These functions load that
   tree from Supabase on startup, and persist each mutation back
   to Supabase right after the local mutation happens, so the UI
   stays instant while the database catches up in the background.
===================================================== */

async function loadDataFromSupabase(){
  const [{ data: shelfRows, error: shelfErr }, { data: nodeRows, error: nodeErr }] = await Promise.all([
    sb.from('shelves').select('*').order('sort_order', { ascending: true }),
    sb.from('nodes').select('*').order('sort_order', { ascending: true }),
  ]);

  if(shelfErr || nodeErr){
    console.error('Supabase load error:', shelfErr || nodeErr);
    document.getElementById('app').innerHTML = `
      <div style="padding:40px 24px; font-family:sans-serif; color:#100507;">
        <h2>Couldn't load your shelves</h2>
        <p>Check that SUPABASE_URL and SUPABASE_ANON_KEY are filled in correctly near the top of this file's &lt;script&gt; tag, and that the schema has been run in your Supabase project.</p>
        <p style="color:#84696D; font-size:13px;">${escapeHtml((shelfErr||nodeErr).message||'')}</p>
      </div>`;
    return;
  }

  // Build each node's children array from the flat nodes table by parent_id.
  const nodesByParent = {};
  nodeRows.forEach(row=>{
    const key = row.parent_id || `root:${row.shelf_id}`;
    if(!nodesByParent[key]) nodesByParent[key] = [];
    nodesByParent[key].push(row);
  });

  function buildChildren(node){
    const children = nodesByParent[node.id] || [];
    return children.map(row => toLocalNode(row));
  }

  function toLocalNode(row){
    const local = { id: row.id, type: row.type, name: row.name };
    if(row.type === 'item'){
      local.note = row.note || '';
      local.link = row.link || '';
    } else {
      local.children = [];
    }
    return local;
  }

  // First pass: build a flat map of every node so we can attach children.
  const allLocalById = {};
  nodeRows.forEach(row => { allLocalById[row.id] = toLocalNode(row); });
  nodeRows.forEach(row => {
    if(row.type === 'group'){
      const kids = nodesByParent[row.id] || [];
      allLocalById[row.id].children = kids.map(r => allLocalById[r.id]);
    }
  });

  DB.shelves = shelfRows.map(row => ({
    id: row.id,
    name: row.name,
    color: row.color,
    favorite: row.is_favorite,
    private: row.is_private,
    updated: row.updated_at,
    nodes: (nodesByParent[`root:${row.id}`] || []).map(r => allLocalById[r.id]),
  }));

  render();
}

/* =====================================================
   HOME SHELF DRAG-TO-REORDER
===================================================== */
let dragState = null;

function startShelfDrag(e, shelfId){
  e.preventDefault();
  const card = document.querySelector(`.shelf-card[data-shelf-id="${shelfId}"]`);
  if(!card) return;
  const listArea = card.closest('.list-area');
  dragState = {
    shelfId,
    card,
    listArea,
    startY: e.clientY,
    cardStartTop: card.offsetTop,
    pointerId: e.pointerId,
  };
  card.classList.add('dragging');
  card.style.position = 'relative';
  card.style.zIndex = '10';
  document.addEventListener('pointermove', onShelfDragMove);
  document.addEventListener('pointerup', endShelfDrag);
  document.addEventListener('pointercancel', endShelfDrag);
}

function onShelfDragMove(e){
  if(!dragState) return;
  const deltaY = e.clientY - dragState.startY;
  dragState.card.style.transform = `translateY(${deltaY}px)`;

  // Figure out which sibling card the dragged card is currently overlapping,
  // and swap their order in the underlying data + DOM in real time.
  const siblings = Array.from(dragState.listArea.querySelectorAll('.shelf-card'));
  const draggedRect = dragState.card.getBoundingClientRect();
  const draggedMid = draggedRect.top + draggedRect.height/2;

  for(const sib of siblings){
    if(sib === dragState.card) continue;
    const rect = sib.getBoundingClientRect();
    const sibMid = rect.top + rect.height/2;
    const draggedIndex = siblings.indexOf(dragState.card);
    const sibIndex = siblings.indexOf(sib);

    if(draggedIndex < sibIndex && draggedMid > sibMid){
      swapShelves(dragState.shelfId, sib.dataset.shelfId);
      dragState.card.style.transform = 'translateY(0px)';
      dragState.startY = e.clientY;
      break;
    } else if(draggedIndex > sibIndex && draggedMid < sibMid){
      swapShelves(dragState.shelfId, sib.dataset.shelfId);
      dragState.card.style.transform = 'translateY(0px)';
      dragState.startY = e.clientY;
      break;
    }
  }
}

function swapShelves(idA, idB){
  const indexA = DB.shelves.findIndex(s=>s.id===idA);
  const indexB = DB.shelves.findIndex(s=>s.id===idB);
  if(indexA===-1 || indexB===-1) return;
  [DB.shelves[indexA], DB.shelves[indexB]] = [DB.shelves[indexB], DB.shelves[indexA]];

  // Persist the new order for the two shelves that moved.
  dbUpdateShelf(idA, { sort_order: indexB });
  dbUpdateShelf(idB, { sort_order: indexA });

  // Re-render the list (preserving drag state) so the swapped DOM order matches.
  const savedDragState = dragState;
  render();
  // Re-acquire the dragged card reference since render() rebuilt the DOM.
  const newCard = document.querySelector(`.shelf-card[data-shelf-id="${savedDragState.shelfId}"]`);
  if(newCard){
    newCard.classList.add('dragging');
    newCard.style.position = 'relative';
    newCard.style.zIndex = '10';
    dragState.card = newCard;
    dragState.listArea = newCard.closest('.list-area');
  }
}

function endShelfDrag(e){
  if(!dragState) return;
  dragState.card.classList.remove('dragging');
  dragState.card.style.transform = '';
  dragState.card.style.position = '';
  dragState.card.style.zIndex = '';
  document.removeEventListener('pointermove', onShelfDragMove);
  document.removeEventListener('pointerup', endShelfDrag);
  document.removeEventListener('pointercancel', endShelfDrag);
  dragState = null;
}

/* =====================================================
   HELPERS
===================================================== */
function findShelf(id){ return DB.shelves.find(s=>s.id===id); }

function activeColorHex(d){
  return d.colorIdx==='custom' ? d.customHex : COLORS[d.colorIdx].hex;
}

function resolvePath(shelf, path){
  let nodes = shelf.nodes;
  let trail = [];
  for(const pid of path){
    const found = nodes.find(n=>n.id===pid);
    if(!found) break;
    trail.push(found);
    nodes = found.children || [];
  }
  return {nodes, trail};
}

function searchTree(nodes, query, trailNames=[], trailIds=[]){
  let results = [];
  for(const n of nodes){
    const nameMatch = n.name && n.name.toLowerCase().includes(query);
    const noteMatch = n.type==='item' && n.note && n.note.toLowerCase().includes(query);
    const linkMatch = n.type==='item' && n.link && n.link.toLowerCase().includes(query);
    if(nameMatch || noteMatch || linkMatch){
      results.push({node:n, trailNames, trailIds});
    }
    if(n.type==='group' && n.children && n.children.length){
      results = results.concat(searchTree(n.children, query, [...trailNames, n.name], [...trailIds, n.id]));
    }
  }
  return results;
}

function goToSearchResult(pathIds){
  state.path = pathIds;
  state.search = '';
  render();
}

function goToHomeSearchResult(shelfId, pathIds){
  openShelf(shelfId, pathIds);
}

function countAll(nodes){
  let total = 0;
  for(const n of nodes){
    if(n.type==='item') total++;
    else total += countAll(n.children||[]);
  }
  return total;
}

function directChildCount(nodes){ return nodes.length; }

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function jsArrayLiteral(arr){
  return '[' + arr.map(v => typeof v==='string' ? `'${String(v).replace(/'/g,"\\'")}'` : v).join(',') + ']';
}

function formatShortDate(longStr){
  const d = new Date(longStr);
  if(isNaN(d.getTime())) return longStr;
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${mm} ${dd} ${yyyy}.`;
}

function renderHome(){
  const tab = state.homeTab;
  const homeQuery = state.search.trim().toLowerCase();

  let rows;
  if(homeQuery){
    // Global search across every shelf, showing individual matches (items or
    // categories/groups) with a full breadcrumb, rather than just shelf cards.
    let results = [];
    DB.shelves.forEach(s=>{
      if(s.name.toLowerCase().includes(homeQuery)){
        results.push({ shelf:s, node:{name:s.name, type:'shelf'}, trailNames:[], trailIds:[] });
      }
      searchTree(s.nodes, homeQuery).forEach(r=>{
        results.push({ shelf:s, node:r.node, trailNames:r.trailNames, trailIds:r.trailIds });
      });
    });

    rows = results.map(r=>{
      const crumbParts = [r.shelf.name, ...r.trailNames];
      const crumb = r.node.type!=='shelf' ? crumbParts.join(' / ') : '';
      const targetPath = r.node.type==='group' ? r.trailIds.concat(r.node.id) : r.trailIds;
      return `
        <div class="search-result-row" onclick="goToHomeSearchResult('${r.shelf.id}', ${jsArrayLiteral(targetPath)})">
          ${crumb?`<div class="search-result-crumb">${escapeHtml(crumb)}</div>`:''}
          <div class="search-result-name">${escapeHtml(r.node.name)}</div>
        </div>`;
    }).join('') || `<div class="empty-state">No results for "${escapeHtml(state.search.trim())}"</div>`;
  } else {
    let shelves = DB.shelves;
    if(tab==='favorites') shelves = shelves.filter(s=>s.favorite);
    if(tab==='recents') shelves = [...shelves].sort((a,b)=> (a.updated<b.updated?1:-1)).slice(0,5);

    const homeJustToggled = !!state.homeEditJustToggled;
    state.homeEditJustToggled = false;

    rows = shelves.map(s=>{
      const nodes = s.nodes;
      const direct = directChildCount(nodes);
      const total = countAll(nodes);
      const txt = textColorFor(s.color);
      const isFlatItemShelf = nodes.length>0 && nodes[0].type==='item';
      const isEmpty = direct===0 && total===0;
      const cardClick = state.homeEditing ? '' : `onclick="openShelf('${s.id}')"`;
      const fadeClass = homeJustToggled ? ' home-fade-in' : '';
      const dragEnabled = tab==='all' || tab==='favorites';
      return `
        <div class="shelf-card" data-shelf-id="${s.id}" style="background:${s.color}; color:${txt};" ${cardClick}>
          <h3>${escapeHtml(s.name)}
            ${s.private?`<span class="material-icon shelf-lock-icon" style="color:${txt};">lock</span>`:''}
            ${(!state.homeEditing && !isEmpty) ? `<span class="badges-inline${fadeClass}">
              ${isFlatItemShelf?'':`<span class="badge filled" style="background:rgba(0,0,0,0.2); color:${txt};">${direct}</span>`}
              <span class="badge outline" style="border-color:${txt}; color:${txt};">${total}</span>
            </span>` : ''}
          </h3>
          ${state.homeEditing ? `
            <span class="home-edit-actions${fadeClass}">
              <button class="home-edit-icon-btn" style="color:${txt};" onclick="toggleShelfFavorite('${s.id}')">
                <span class="material-icon" style="font-size:17px;${s.favorite?` font-variation-settings:'FILL' 1;`:''}">star</span>
              </button>
              <button class="home-edit-icon-btn drag-handle ${dragEnabled?'':'drag-disabled'}" style="color:${txt};" title="Rearrange"
                ${dragEnabled?`onpointerdown="startShelfDrag(event,'${s.id}')"`:''}>
                <span class="material-icon">drag_indicator</span>
              </button>
              <button class="home-edit-icon-btn" style="color:${txt};" onclick="removeShelfPrompt('${s.id}')">
                <span class="material-icon">remove</span>
              </button>
            </span>
          ` : `<div class="arrow-circle" style="color:${txt};"><span class="material-icon">arrow_forward</span></div>`}
        </div>`;
    }).join('') || `<div class="empty-state">No shelves yet. Tap + to build one.</div>`;
  }

  return `
    <div class="home-header">
      <div class="home-header-row">
        <h1 class="logo-mark" role="img" aria-label="Shelved"><svg viewBox="0 0 106.44 19" xmlns="http://www.w3.org/2000/svg">
  <path d="M7.22.29c3.82,0,6.22,2.11,6.22,5.47h-3.86c0-1.25-.94-2.02-2.4-2.02-1.58,0-2.59.72-2.59,1.9,0,1.08.55,1.61,1.8,1.87l2.66.55c3.17.65,4.68,2.16,4.68,4.97,0,3.43-2.69,5.67-6.77,5.67S.42,16.57.42,13.23h3.86c0,1.3.96,2.02,2.69,2.02s2.86-.7,2.86-1.82c0-.98-.46-1.49-1.63-1.73l-2.71-.55c-3.17-.65-4.8-2.45-4.8-5.35,0-3.22,2.71-5.51,6.53-5.51Z"/>
  <path d="M15.83,18.39V.29h3.72v7.34c.74-1.03,2.11-1.63,3.67-1.63,2.86,0,4.51,1.82,4.51,4.97v7.42h-3.7v-6.53c0-1.51-.84-2.5-2.11-2.5-1.46,0-2.4.96-2.4,2.45v6.58h-3.7.01Z"/>
  <path d="M29.73,12.37c0-3.74,2.52-6.36,6.14-6.36s6.12,2.47,6.12,6.38v.94l-8.71.05c.22,1.58,1.1,2.33,2.74,2.33,1.39,0,2.38-.5,2.64-1.37h3.38c-.43,2.66-2.81,4.37-6.1,4.37-3.62,0-6.22-2.64-6.22-6.34h0ZM33.33,11.1h4.99c0-1.27-.94-2.09-2.42-2.09s-2.28.65-2.57,2.09Z"/>
  <path d="M44.18,18.39V.29h3.7v18.1s-3.7,0-3.7,0Z"/>
  <path d="M49.38,6.39h3.98l1.46,4.2c.6,1.75,1.08,3.26,1.18,3.82.14-.7.67-2.26,1.27-3.82l1.61-4.2h3.84l-5.02,12h-3.65l-4.68-12h.01Z"/>
  <path d="M63.59,12.37c0-3.74,2.52-6.36,6.14-6.36s6.12,2.47,6.12,6.38v.94l-8.71.05c.22,1.58,1.1,2.33,2.74,2.33,1.39,0,2.38-.5,2.64-1.37h3.38c-.43,2.66-2.81,4.37-6.1,4.37-3.62,0-6.22-2.64-6.22-6.34h0ZM67.19,11.1h4.99c0-1.27-.94-2.09-2.42-2.09s-2.28.65-2.57,2.09Z"/>
  <path d="M77.39,12.46c0-3.82,2.28-6.46,5.93-6.46,1.49,0,2.9.6,3.6,1.49V.29h3.7v18.1h-3.48l-.19-1.54c-.65,1.1-2.14,1.85-3.86,1.85-3.46,0-5.69-2.45-5.69-6.24h0ZM86.9,12.32c0-1.8-1.2-3-2.93-3s-2.86,1.22-2.86,3,1.1,3,2.86,3,2.93-1.2,2.93-3Z"/>
  <g>
    <path d="M99.55,5.59l-1.01-.22c-.55-.12-.66-.36-.66-.69,0-.44.38-.72.99-.72.56,0,.89.27.91.73v.15h1.44v-.16c-.04-1.19-.89-1.98-2.18-2.03h-.16c-1.44-.01-2.45.84-2.45,2.06,0,1.05.62,1.75,1.79,2.01l1.03.23c.55.13.63.39.63.65,0,.43-.42.71-1.07.71-.3,0-1.01-.07-1.01-.72v-.16h-1.44v.16c.04,1.26.98,2.04,2.47,2.04s2.51-.86,2.51-2.13c0-1.03-.58-1.66-1.77-1.92Z"/>
    <path d="M98.86.17c-3.39,0-6.04,2.63-6.04,5.98s2.6,5.98,6.04,5.98,5.98-2.57,5.98-5.98S102.27.17,98.86.17ZM98.86,10.71c-2.63,0-4.54-1.92-4.54-4.56s1.95-4.56,4.54-4.56,4.48,1.92,4.48,4.56-1.88,4.56-4.48,4.56Z"/>
  </g>
</svg></h1>
        <button class="pill-btn" onclick="toggleHomeEditing()">${state.homeEditing?'Done':'Edit'}</button>
      </div>
      <div class="tab-stack">
        <button class="${tab==='favorites'?'active':''}" onclick="state.homeTab='favorites'; render()">Favorites</button>
        <button class="${tab==='recents'?'active':''}" onclick="state.homeTab='recents'; render()">Recents</button>
        <button class="${tab==='all'?'active':''}" onclick="state.homeTab='all'; render()">All</button>
      </div>
    </div>
    <div class="home-divider"></div>
    <div class="list-area" style="padding-top:18px;">${rows}</div>
    <div class="bottom-bar">
      <input id="searchInput" class="search-input" placeholder="Search" value="${escapeHtml(state.search)}" oninput="state.search=this.value; render()">
      <button class="add-btn-circle home-add-circle" onclick="openBuildSheet()">+</button>
    </div>
  `;
}

/* =====================================================
   BUILD A SHELF — overlay sheet (slides over home only)
===================================================== */
function openBuildSheet(){
  state.showBuildSheet = true;
  state.buildJustOpened = true;
  state.buildClosing = false;
  render();
}

function closeBuildSheet(){
  state.buildClosing = true;
  render();
  setTimeout(()=>{
    state.showBuildSheet = false;
    state.buildClosing = false;
    render();
  }, 400);
}

function buildSheetInnerHtml(){
  const d = state.buildDraft;
  const isCustom = d.colorIdx === 'custom';
  const activeHex = activeColorHex(d);

  const swatches = COLORS.map((c,i)=>`
    <div class="swatch ${i===d.colorIdx?'selected':''}" style="background:${c.hex}" onclick="state.buildDraft.colorIdx=${i}; render()"></div>
  `).join('') + `
    <label class="swatch custom-swatch ${isCustom?'selected':''}">
      <span class="material-icon">colorize</span>
      <input type="color" value="${d.customHex}"
        oninput="state.buildDraft.customHex=this.value; state.buildDraft.colorIdx='custom'; render()">
    </label>
  `;

  const catRows = d.categories.map((c,i)=>`
    <div class="cat-input-row">
      <input class="cat-text-input" placeholder="Category" value="${escapeHtml(c)}"
        oninput="state.buildDraft.categories[${i}]=this.value">
      <div class="cat-row-actions">
        ${i>0 ? `<button class="add-circle" onclick="removeCategoryRow(${i})">−</button>` : ''}
        <button class="add-circle" onclick="addCategoryRow(${i})">+</button>
      </div>
    </div>
  `).join('');

  return `
    <div class="sheet-fade"></div>
    <div class="sheet-panel">
      <div class="sheet-header-row">
        <div class="sheet-header-title">Build a Shelf</div>
        <button class="circle-btn build-sheet-close" onclick="closeBuildSheet()"><span class="material-icon">close</span></button>
      </div>
      <div class="form-area">
        <div class="form-label">What color is your new shelf?</div>
        <div class="swatches">${swatches}</div>

        <div class="form-label">What is your shelf called?</div>
        <input class="name-input" placeholder="Shelf Name" value="${escapeHtml(d.name)}"
          oninput="state.buildDraft.name=this.value"
          style="background:${activeHex}; color:${textColorFor(activeHex)};">

        <div class="form-label">Should this shelf be private?</div>
        <div class="privacy-toggle">
          <button class="privacy-btn ${!d.isPrivate?'selected':''}" onclick="state.buildDraft.isPrivate=false; render()">Public</button>
          <button class="privacy-btn ${d.isPrivate?'selected':''}" onclick="state.buildDraft.isPrivate=true; render()">Private</button>
        </div>

        <div class="form-label">What categories would you like to add?</div>
        ${catRows}
      </div>
      <div class="form-bottom-fade"></div>
    </div>
    <button class="bottom-cta" onclick="saveNewShelf()"><span class="material-icon">arrow_forward</span></button>
  `;
}

function mountBuildSheet(){
  const app = document.getElementById('app');
  const wrapper = document.createElement('div');
  wrapper.id = 'buildSheetWrapper';
  wrapper.className = 'build-sheet-wrapper ' + (state.buildClosing ? 'animate-out' : (state.buildJustOpened ? 'animate-in' : ''));
  wrapper.innerHTML = buildSheetInnerHtml();
  app.appendChild(wrapper);

  let offset = 0;
  if(state.screen==='home'){
    const header = app.querySelector('.home-header');
    const divider = app.querySelector('.home-divider');
    if(header) offset += header.getBoundingClientRect().height;
    if(divider) offset += divider.getBoundingClientRect().height;
  } else if(state.screen==='shelf'){
    const topbar = app.querySelector('.topbar');
    const crumb = app.querySelector('.crumb-row');
    if(topbar) offset += topbar.getBoundingClientRect().height;
    if(crumb) offset += crumb.getBoundingClientRect().height;
  }

  const fade = wrapper.querySelector('.sheet-fade');
  if(fade) fade.style.height = offset + 'px';

  state.buildJustOpened = false;
}

function addCategoryRow(i){
  state.buildDraft.categories.push('');
  render();
}

function removeCategoryRow(i){
  state.buildDraft.categories.splice(i,1);
  if(state.buildDraft.categories.length===0) state.buildDraft.categories.push('');
  render();
}

async function saveNewShelf(){
  const d = state.buildDraft;
  if(!d.name.trim()){ alert('Give your shelf a name first.'); return; }
  const cats = d.categories.filter(c=>c.trim());

  state.showBuildSheet = false;
  state.buildClosing = false;
  state.buildJustOpened = false;

  const shelfRow = await dbInsertShelf({
    name: d.name.trim(), color: activeColorHex(d), favorite:false, private:d.isPrivate,
  });
  if(!shelfRow){ alert('Could not save the shelf — check your Supabase connection.'); return; }

  const nodes = [];
  for(let i=0; i<cats.length; i++){
    const nodeRow = await dbInsertNode({ shelfId: shelfRow.id, parentId:null, type:'group', name:cats[i], sortOrder:i });
    if(nodeRow) nodes.push({ id: nodeRow.id, type:'group', name:cats[i], children:[] });
  }

  const id = shelfRow.id;
  DB.shelves.unshift({
    id, name:d.name.trim(), color: activeColorHex(d), favorite:false, private:d.isPrivate,
    updated: shelfRow.updated_at,
    nodes
  });
  state.buildDraft = { colorIdx:0, customHex:'#A89F91', name:'', isPrivate:false, categories:[''] };
  if(d.isPrivate){
    openShelf(id);
  } else {
    go('shelf',{shelfId:id, path:[]});
  }
}

/* =====================================================
   RENDER: SHELF DRILL-DOWN
===================================================== */
function renderShelf(){
  const shelf = findShelf(state.shelfId);
  if(!shelf) return renderHome();
  const {nodes, trail} = resolvePath(shelf, state.path);
  const atRoot = state.path.length===0;
  const direct = directChildCount(shelf.nodes);
  const total = countAll(shelf.nodes);
  const parentCrumb = trail.length ? trail[0].name : null;
  const parentSubCrumb = trail.length > 1 ? trail[trail.length-1].name : null;

  const onBack = () => {
    if(state.path.length===0){ go('home'); }
    else { state.path.pop(); render(); }
  };
  window.__shelfBack = onBack;

  const q = state.search.trim().toLowerCase();

  let bodyHtml = '';
  let listClass = 'list-area';
  const isGroupLevel = nodes.length===0 || nodes[0].type==='group';
  const justToggledEdit = !!state.editJustToggled;

  if(q){
    // Global recursive search across the entire shelf, not just the current level.
    listClass += ' with-side-pad';
    const results = searchTree(shelf.nodes, q);
    if(results.length===0){
      bodyHtml = `<div class="empty-state">No results for "${escapeHtml(state.search.trim())}"</div>`;
    } else {
      bodyHtml = results.map(r=>{
        const crumb = [shelf.name, ...r.trailNames].join(' / ');
        if(r.node.type==='group'){
          const c = countAll(r.node.children||[]);
          return `
            <div class="search-result-row" onclick="goToSearchResult(${jsArrayLiteral(r.trailIds.concat(r.node.id))})">
              ${crumb?`<div class="search-result-crumb">${escapeHtml(crumb)}</div>`:''}
              <div class="search-result-name">${escapeHtml(r.node.name)} <span class="count">(${c})</span></div>
            </div>`;
        }
        return `
          <div class="search-result-row" onclick="goToSearchResult(${jsArrayLiteral(r.trailIds)})">
            ${crumb?`<div class="search-result-crumb">${escapeHtml(crumb)}</div>`:''}
            <div class="search-result-name">${escapeHtml(r.node.name)}</div>
          </div>`;
      }).join('');
    }
  } else if(isGroupLevel){
    if(state.editing){
      listClass += ' with-side-pad';
      // editable rows: underline contenteditable div + minus/plus circles, matching Build a Shelf category editor
      bodyHtml = nodes.map(n=>`
        <div class="cat-input-row${atRoot?'':' sub-level'}">
          <div class="cat-text-input${atRoot?'':' sub-level'}" contenteditable="true" data-placeholder="${atRoot?'Category':'Subcategory'}"
            oninput="updateGroupName('${n.id}', this.textContent)"
            onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}">${escapeHtml(n.name)}</div>
          <div class="cat-row-actions">
            <button class="add-circle" onclick="deleteGroupRow('${n.id}')">−</button>
            <button class="add-circle" onclick="addGroupRow()">+</button>
          </div>
        </div>
      `).join('') + (nodes.length===0 ? `
        <div class="empty-level-choice">
          <div class="cat-input-row${atRoot?'':' sub-level'}">
            <div class="cat-text-input${atRoot?'':' sub-level'}" contenteditable="true" data-placeholder="${atRoot?'Category':'Subcategory'}"
              onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}"></div>
            <div class="cat-row-actions">
              <button class="add-circle" onclick="addGroupRow()">+</button>
            </div>
          </div>
          <div class="empty-level-or">or</div>
          <div class="add-item-row" onclick="quickAddItem()">
            <span>Add Item</span>
            <button class="add-circle-outline" onclick="event.stopPropagation(); quickAddItem()">+</button>
          </div>
        </div>
      ` : '');
    } else if(nodes.length===0){
      bodyHtml = `<div class="empty-state">Nothing here yet.</div>`;
    } else if(atRoot){
      // root: simple serif rows (e.g. cities)
      bodyHtml = nodes.map(n=>`<div class="simple-row" onclick="drillInto('${n.id}')">${escapeHtml(n.name)}</div>`).join('');
    } else {
      // nested groups: bold sans rows (e.g. categories)
      bodyHtml = nodes.map(n=>{
        const c = countAll(n.children||[]);
        return `<div class="cat-row" onclick="drillInto('${n.id}')">${escapeHtml(n.name)} <span class="count">(${c})</span></div>`;
      }).join('');
    }
  } else {
    if(nodes.length===0){
      bodyHtml = `<div class="add-item-row" onclick="quickAddItem()">
        <span>Add Item</span>
        <button class="add-circle-outline" onclick="event.stopPropagation(); quickAddItem()">+</button>
      </div>` + `<div class="empty-state">Nothing here yet.</div>`;
    } else {
      const newestFirst = [...nodes].reverse();
      bodyHtml = `<div class="add-item-row" onclick="quickAddItem()">
        <span>Add Item</span>
        <button class="add-circle-outline" onclick="event.stopPropagation(); quickAddItem()">+</button>
      </div>` + newestFirst.map(n=>{
        if(state.editing){
          return `
            <div class="item-card editing-fields">
              <div class="item-edit-top">
                <div class="item-name-input" contenteditable="true" data-placeholder="Item name" data-name-for="${n.id}"
                  oninput="updateItemField('${n.id}','name',this.textContent)"
                  onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}">${escapeHtml(n.name)}</div>
                <div class="cat-row-actions">
                  <button class="add-circle" onclick="deleteItem('${n.id}')">−</button>
                  <button class="add-circle" onclick="quickAddItem()">+</button>
                </div>
              </div>
              <div class="item-note-input" contenteditable="true" data-placeholder="Add Note" data-note-for="${n.id}"
                oninput="updateItemField('${n.id}','note',this.innerText)">${escapeHtml(n.note||'')}</div>
              <div class="item-link-row">
                <span class="material-icon link-icon">link</span>
                <div class="item-link-input" contenteditable="true" data-placeholder="Add Link"
                  oninput="updateItemField('${n.id}','link',this.textContent)"
                  onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}">${escapeHtml(n.link||'')}</div>
              </div>
            </div>
          `;
        }
        return `
        <div class="item-card">
          <div>
            <div class="name">${escapeHtml(n.name)}</div>
            ${n.note?`<div class="note">${escapeHtml(n.note)}</div>`:''}
            ${n.link?`<a class="link" href="${escapeHtml(n.link)}" target="_blank" onclick="event.stopPropagation()"><span class="material-icon link-icon">link</span> ${escapeHtml(n.link)}</a>`:''}
          </div>
        </div>
      `;
      }).join('');
    }
  }

  return `
    <div class="topbar">
      <div class="topbar-left">
        <button class="circle-btn-filled" onclick="go('home')"><span class="material-icon">home</span></button>
        <button class="circle-btn" onclick="__shelfBack()"><span class="material-icon">arrow_back</span></button>
      </div>
      <!-- Date intentionally hidden from UI; shelf.updated is still stored and formatted via formatShortDate() if needed later -->
      <span class="title-center hidden"></span>
      <button class="pill-btn" onclick="toggleShelfEditing()">${state.editing?'Done':'Edit'}</button>
    </div>
    <div class="crumb-row">
      <div class="crumb-title">
        ${escapeHtml(shelf.name)}
        ${state.editing ? `
          <span class="home-edit-actions">
            <button class="home-edit-icon-btn" style="color:var(--dark-text);" onclick="toggleShelfFavorite('${shelf.id}'); render();">
              <span class="material-icon" style="font-size:17px;${shelf.favorite?` font-variation-settings:'FILL' 1;`:''}">star</span>
            </button>
            <button class="home-edit-icon-btn" style="color:var(--dark-text);" onclick="deleteCurrentShelf('${shelf.id}')">
              <span class="material-icon">remove</span>
            </button>
          </span>
        ` : `<span class="count-badges">
          <span class="badge filled">${direct}</span>
          <span class="badge outline">${total}</span>
        </span>`}
      </div>
    </div>
    ${parentCrumb ? `<div class="group-title-row"><span>${escapeHtml(parentCrumb)}</span>${parentSubCrumb?` <span class="group-title-sub">/ ${escapeHtml(parentSubCrumb)}</span>`:''}</div>` : ''}
    <div id="shelfListArea" class="${listClass}${justToggledEdit?' rows-slide-container':''}" style="padding-top:${parentCrumb ? '14' : '22'}px;">${bodyHtml}</div>
    <div class="bottom-bar">
      <input id="searchInput" class="search-input" placeholder="Search" value="${escapeHtml(state.search)}" oninput="state.search=this.value; render()">
      <button class="add-btn-circle" onclick="openBuildSheet()">+</button>
    </div>
  `;
}

function drillInto(nodeId){
  state.path.push(nodeId);
  state.search='';
  render();
}

const itemFieldSaveTimers = {};
function updateItemField(nodeId, field, value){
  const shelf = findShelf(state.shelfId);
  const {nodes} = resolvePath(shelf, state.path);
  const node = nodes.find(n=>String(n.id)===String(nodeId));
  if(node) node[field] = value;
  // intentionally no render() here so the field doesn't lose focus while typing

  const timerKey = nodeId + ':' + field;
  clearTimeout(itemFieldSaveTimers[timerKey]);
  itemFieldSaveTimers[timerKey] = setTimeout(()=>{
    dbUpdateNode(nodeId, { [field]: value });
  }, 400);
}

function toggleShelfEditing(){
  if(state.editing){
    // leaving edit mode ("Done") — clean up any item the user added but never filled in
    const shelf = findShelf(state.shelfId);
    const {nodes} = resolvePath(shelf, state.path);
    for(let i=nodes.length-1; i>=0; i--){
      const n = nodes[i];
      if(n.type==='item'){
        const blank = !(n.name||'').trim() && !(n.note||'').trim() && !(n.link||'').trim();
        if(blank){
          nodes.splice(i,1);
          dbDeleteNode(n.id);
        }
      }
    }
    state.editing = false;
  } else {
    state.editing = true;
  }
  state.editJustToggled = true;
  render();
}

async function quickAddItem(){
  const shelf = findShelf(state.shelfId);
  const {nodes} = resolvePath(shelf, state.path);
  const parentId = state.path.length ? state.path[state.path.length-1] : null;
  const row = await dbInsertNode({ shelfId: shelf.id, parentId, type:'item', name:'', sortOrder: nodes.length });
  if(!row){ alert('Could not add that — check your Supabase connection.'); return; }
  nodes.push({id:row.id, type:'item', name:'', note:'', link:''});
  state.editing = true;
  render();
  requestAnimationFrame(()=>{
    const el = document.querySelector(`[data-name-for="${row.id}"]`);
    if(el) el.focus();
  });
}

function addGroupPrompt(){
  const shelf = findShelf(state.shelfId);
  const {nodes} = resolvePath(shelf, state.path);
  const isItemLevel = nodes.length>0 && nodes[0].type==='item';
  if(isItemLevel){
    const name = prompt('Item name?');
    if(!name) return;
    const note = prompt('Note? (optional)')||'';
    const link = prompt('Link? (optional)')||'';
    nodes.push({id:Date.now(), type:'item', name, note, link});
  } else {
    const name = prompt('New group / category name? (Leave blank to add an item instead)');
    if(name){
      nodes.push({id:'g'+Date.now(), type:'group', name, children:[]});
    } else {
      const itemName = prompt('Item name?');
      if(!itemName) return;
      nodes.push({id:Date.now(), type:'item', name:itemName});
    }
  }
  render();
}

function deleteItem(id){
  const shelf = findShelf(state.shelfId);
  const {nodes} = resolvePath(shelf, state.path);
  const idx = nodes.findIndex(n=>String(n.id)===String(id));
  if(idx>-1) nodes.splice(idx,1);
  render();
  dbDeleteNode(id);
}

const nodeNameSaveTimers = {};
function updateGroupName(nodeId, value){
  const shelf = findShelf(state.shelfId);
  const {nodes} = resolvePath(shelf, state.path);
  const node = nodes.find(n=>String(n.id)===String(nodeId));
  if(node) node.name = value;
  // intentionally no render() here so the input doesn't lose focus while typing

  // Debounce the Supabase write so we're not firing one per keystroke.
  clearTimeout(nodeNameSaveTimers[nodeId]);
  nodeNameSaveTimers[nodeId] = setTimeout(()=>{
    dbUpdateNode(nodeId, { name: value });
  }, 400);
}

async function addGroupRow(){
  const shelf = findShelf(state.shelfId);
  const {nodes} = resolvePath(shelf, state.path);
  const parentId = state.path.length ? state.path[state.path.length-1] : null;
  const row = await dbInsertNode({ shelfId: shelf.id, parentId, type:'group', name:'', sortOrder: nodes.length });
  if(!row){ alert('Could not add that — check your Supabase connection.'); return; }
  nodes.push({ id: row.id, type:'group', name:'', children:[] });
  render();
}

function deleteGroupRow(nodeId){
  const shelf = findShelf(state.shelfId);
  const {nodes} = resolvePath(shelf, state.path);
  const idx = nodes.findIndex(n=>String(n.id)===String(nodeId));
  if(idx===-1) return;
  const node = nodes[idx];
  const childCount = (node.children||[]).length;
  if(childCount>0){
    const noun = childCount===1 ? 'item or subcategory' : 'items or subcategories';
    const ok = confirm(`"${node.name||'This category'}" still has ${childCount} ${noun} inside. Deleting it will remove everything inside as well. Continue?`);
    if(!ok) return;
  }
  nodes.splice(idx,1);
  render();
  dbDeleteNode(nodeId); // cascade deletes its children/items too
}

/* =====================================================
   MAIN RENDER
===================================================== */
function render(){
  const app = document.getElementById('app');

  // Capture focus state before re-rendering so inputs (like search) don't
  // lose the cursor on every keystroke when the DOM gets replaced.
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = (active && typeof active.selectionStart === 'number') ? active.selectionStart : null;
  const selEnd = (active && typeof active.selectionEnd === 'number') ? active.selectionEnd : null;

  // Capture the Build a Shelf form's scroll position too, since it gets
  // fully torn down and rebuilt on every keystroke/button click inside it.
  const existingFormArea = document.querySelector('.sheet-panel .form-area');
  const formScrollTop = existingFormArea ? existingFormArea.scrollTop : 0;

  let html = '';
  if(state.screen==='home') html = renderHome();
  else if(state.screen==='shelf') html = renderShelf();
  app.innerHTML = html;

  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart!=null && el.setSelectionRange){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }

  if(state.showBuildSheet || state.buildClosing){
    mountBuildSheet();
    const newFormArea = document.querySelector('.sheet-panel .form-area');
    if(newFormArea) newFormArea.scrollTop = formScrollTop;
  }

  if(state.editJustToggled){
    state.editJustToggled = false;
    const container = document.getElementById('shelfListArea');
    if(container){
      const targetHeight = container.scrollHeight;
      container.style.height = '0px';
      container.style.transition = 'none';
      // force layout, then animate to full height on next frame
      requestAnimationFrame(()=>{
        container.style.transition = 'height 0.32s ease';
        container.style.height = targetHeight + 'px';
        setTimeout(()=>{
          container.style.transition = '';
          container.style.height = '';
          container.classList.remove('rows-slide-container');
        }, 340);
      });
    }
  }
}

/* =====================================================
   SIMPLE PASSWORD GATE
   NOTE: This is a basic front-end deterrent only, not real
   security — the password lives in this file's source code,
   visible to anyone who views page source. Good enough to keep
   out casual visitors, not appropriate for sensitive data.
===================================================== */
const SITE_PASSWORD = 'shelby'; // <-- change this to whatever you want
const PRIVATE_SHELF_PASSWORD = 'secrets'; // <-- separate password for shelves marked Private
const AUTH_STORAGE_KEY = 'shelved_unlocked';

function checkSitePassword(){
  const input = document.getElementById('passwordInput');
  const errorEl = document.getElementById('passwordGateError');
  if(input.value === SITE_PASSWORD){
    localStorage.setItem(AUTH_STORAGE_KEY, 'true');
    unlockSite();
  } else {
    errorEl.classList.remove('hidden');
    input.value = '';
    input.focus();
  }
}

function unlockSite(){
  document.getElementById('passwordGate').classList.add('hidden');
  document.getElementById('app').innerHTML = `
    <div style="display:flex; align-items:center; justify-content:center; height:100%; font-family:sans-serif; color:#84696D;">
      Loading your shelves…
    </div>`;
  loadDataFromSupabase();
}

if(localStorage.getItem(AUTH_STORAGE_KEY) === 'true'){
  unlockSite();
} else {
  document.getElementById('passwordGate').style.display = 'flex';
}

// iOS Safari can leave the layout height stale after the on-screen keyboard
// shows/hides while editing a contenteditable field, which can lock the
// list area at a height that no longer matches the real viewport (so it
// stops scrolling). Force a reflow by nudging #app's height whenever the
// visual viewport changes.
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', ()=>{
    const app = document.getElementById('app');
    if(!app) return;
    app.style.height = window.visualViewport.height + 'px';
  });
}
</script>
